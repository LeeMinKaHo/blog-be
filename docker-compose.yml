# docker-compose.yml

services:
  # 1. Database (MySQL 8)
  db:
    image: mysql:8
    container_name: blog-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD} # Hoặc đặt riêng MYSQL_ROOT_PASSWORD trong .env
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Redis (Dành cho BullMQ/Cache)
  redis:
    image: redis:alpine
    container_name: blog-redis
    ports:
      - "6379:6379"

  # 3. Backend (NestJS)
  backend:
    build: .
    container_name: blog-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    # Docker sẽ truyền đè các biến này nếu có trong container
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      # --- Mail (Gmail SMTP) ---
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - SITE_URL=${SITE_URL}
    volumes:
      - ./uploads:/usr/src/app/uploads

  # 4. Frontend (Next.js)
  frontend:
    # Build từ thư mục FE (sử dụng relative path tương ứng trên máy thật)
    build: ../../nextjs/blog_fe
    container_name: blog-frontend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - API_URL=http://blog-backend:3000

volumes:
  mysql_data:
